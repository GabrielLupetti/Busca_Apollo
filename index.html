<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integração Apollo & Power Automate</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 40px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .card {
            background: #fff;
            padding: 20px 25px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 14px;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }
        .range-group {
            display: flex;
            gap: 15px;
        }
        .range-group .form-group {
            flex: 1;
            margin-bottom: 0;
        }
        .help-text {
            font-size: 0.85em;
            color: #7f8c8d;
            margin-top: 5px;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #2980b9;
        }

        /* Estilos dos campos de Tags (estilo Apollo) */
        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            min-height: 42px;
            background: #fff;
            cursor: text;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .tag-container:focus-within {
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }
        .tag {
            display: flex;
            align-items: center;
            background-color: #e1f0fa;
            color: #2980b9;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 500;
            animation: fadeIn 0.2s ease-in-out;
        }
        .tag .remove-tag {
            margin-left: 6px;
            cursor: pointer;
            font-weight: bold;
            color: #2980b9;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            line-height: 1;
            transition: background-color 0.2s, color 0.2s;
        }
        .tag .remove-tag:hover {
            background-color: #c0392b;
            color: white;
        }
        .tag-input {
            border: none;
            outline: none;
            flex-grow: 1;
            min-width: 150px;
            font-size: 14px;
            padding: 4px 0;
            font-family: inherit;
            background: transparent;
        }

        /* Área de Resultado Limpo para Automação */
        .result-box {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 2px solid #2ecc71;
            margin-top: 20px;
        }
        .output-textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: monospace;
            background: #f8f9fa;
            resize: none;
            margin-bottom: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Configuração de Busca - Apollo</h1>
    
    <form id="apolloForm">
        <div class="card">
            <div class="form-group">
                <label>Nome das Empresas</label>
                <div class="tag-container" id="companiesContainer">
                    <input type="text" class="tag-input" id="companyNameInput" placeholder="Digite ou cole empresas e aperte Enter">
                </div>
                <div class="help-text">Você pode colar várias empresas de uma planilha.</div>
            </div>
        </div>

        <div class="card">
            <label>Número de Funcionários (Custom Range)</label>
            <div class="range-group">
                <div class="form-group">
                    <input type="number" id="employeesMin" placeholder="Mínimo (Ex: 50)" min="1">
                </div>
                <div class="form-group">
                    <input type="number" id="employeesMax" placeholder="Máximo (Ex: 200)" min="1">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="form-group">
                <label>Palavras-Chaves da Empresa</label>
                <div class="tag-container" id="keywordsContainer">
                    <input type="text" class="tag-input" id="keywordsInput" placeholder="Digite ou cole palavras-chaves e aperte Enter">
                </div>
                <div class="help-text">Cole de uma planilha ou digite separando por vírgula.</div>
            </div>
        </div>

        <div class="card">
            <div class="form-group">
                <label>Cargo de Funcionários</label>
                <div class="tag-container" id="titlesContainer">
                    <input type="text" class="tag-input" id="titlesInput" placeholder="Digite ou cole cargos e aperte Enter">
                </div>
                <div class="help-text">Cole de uma planilha ou digite separando por vírgula.</div>
            </div>
        </div>

        <button type="submit">Preparar Dados para Integração</button>
    </form>

    <div id="automationResult" class="result-box">
        <h3 style="color: #27ae60; margin-top: 0;">Dados Prontos para o Power Automate</h3>
        
        <label>Lista de Empresas (Limpa):</label>
        <textarea id="outputCompanies" class="output-textarea" readonly></textarea>

        <label>Lista de Cargos (Limpa):</label>
        <textarea id="outputTitles" class="output-textarea" readonly></textarea>
        
        <button type="button" style="background-color: #95a5a6;" onclick="window.location.reload()">Preencher Novamente</button>
    </div>
</div>

<script>
    function setupTagInput(containerId, inputId) {
        const container = document.getElementById(containerId);
        const input = document.getElementById(inputId);
        const tags = [];

        function renderTags() {
            container.querySelectorAll('.tag').forEach(el => el.remove());
            tags.forEach((tagText, index) => {
                const tagEl = document.createElement('div');
                tagEl.className = 'tag';
                tagEl.innerHTML = `<span>${tagText}</span> <span class="remove-tag" data-index="${index}">&times;</span>`;
                container.insertBefore(tagEl, input);
            });

            container.querySelectorAll('.remove-tag').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const idx = parseInt(this.getAttribute('data-index'));
                    tags.splice(idx, 1);
                    renderTags();
                });
            });
        }

        function addTags(text) {
            const newTags = text.split(/[\n,\t]+/).map(t => t.trim()).filter(t => t.length > 0);
            newTags.forEach(t => {
                if (!tags.includes(t)) {
                    tags.push(t);
                }
            });
            renderTags();
        }

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ',') {
                e.preventDefault();
                addTags(this.value);
                this.value = '';
            } else if (e.key === 'Backspace' && this.value === '' && tags.length > 0) {
                tags.pop();
                renderTags();
            }
        });

        input.addEventListener('paste', function(e) {
            e.preventDefault();
            const pasteData = (e.clipboardData || window.clipboardData).getData('text');
            addTags(pasteData);
        });

        container.addEventListener('click', function(e) {
            if (e.target === container) {
                input.focus();
            }
        });

        return {
            getTags: () => [...tags]
        };
    }

    const companiesManager = setupTagInput('companiesContainer', 'companyNameInput');
    const keywordsManager = setupTagInput('keywordsContainer', 'keywordsInput');
    const titlesManager = setupTagInput('titlesContainer', 'titlesInput');

    document.getElementById('apolloForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // Pega as listas limpas direto dos arrays do JavaScript
        const listaEmpresas = companiesManager.getTags();
        const listaCargos = titlesManager.getTags();

        // Alimenta os textareas ocultos quebrando cada item por uma linha nova (\n)
        document.getElementById('outputCompanies').value = listaEmpresas.join('\n');
        document.getElementById('outputTitles').value = listaCargos.join('\n');

        // Esconde o formulário original e exibe a caixinha de dados limpos
        document.getElementById('apolloForm').style.display = 'none';
        document.getElementById('automationResult').style.display = 'block';
    });
</script>

</body>
</html>
