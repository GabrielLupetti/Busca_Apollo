<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de URL - Apollo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 40px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .card {
            background: #fff;
            padding: 20px 25px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 14px;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }
        .range-group {
            display: flex;
            gap: 15px;
        }
        .range-group .form-group {
            flex: 1;
            margin-bottom: 0;
        }
        .help-text {
            font-size: 0.85em;
            color: #7f8c8d;
            margin-top: 5px;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #2980b9;
        }

        /* Estilos dos campos de Tags */
        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            min-height: 42px;
            background: #fff;
            cursor: text;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .tag-container:focus-within {
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }
        .tag {
            display: flex;
            align-items: center;
            background-color: #e1f0fa;
            color: #2980b9;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 500;
            animation: fadeIn 0.2s ease-in-out;
        }
        .tag .remove-tag {
            margin-left: 6px;
            cursor: pointer;
            font-weight: bold;
            color: #2980b9;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            line-height: 1;
            transition: background-color 0.2s, color 0.2s;
        }
        .tag .remove-tag:hover {
            background-color: #c0392b;
            color: white;
        }
        .tag-input {
            border: none;
            outline: none;
            flex-grow: 1;
            min-width: 150px;
            font-size: 14px;
            padding: 4px 0;
            font-family: inherit;
            background: transparent;
        }

        /* Bloco de Resultado */
        .result-card {
            display: none;
            background: #fff;
            padding: 20px 25px;
            margin-top: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.2);
            border: 2px solid #3498db;
            animation: fadeIn 0.3s ease-in-out;
        }
        .result-card h3 {
            margin-top: 0;
            color: #2c3e50;
        }
        .url-box {
            width: 100%;
            padding: 12px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
            word-break: break-all;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        .btn-open {
            background-color: #2ecc71;
        }
        .btn-open:hover {
            background-color: #27ae60;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Configuração de Busca - Apollo</h1>
    
    <form id="apolloForm">
        <div class="card">
            <div class="form-group">
                <label>Nome/Domínio das Empresas</label>
                <div class="tag-container" id="companiesContainer">
                    <input type="text" class="tag-input" id="companyNameInput" placeholder="Digite ou cole empresas e aperte Enter">
                </div>
                <div class="help-text">Você pode colar várias empresas de uma planilha.</div>
            </div>
        </div>

        <div class="card">
            <label>Número de Funcionários (Custom Range)</label>
            <div class="range-group">
                <div class="form-group">
                    <input type="number" id="employeesMin" placeholder="Mínimo (Ex: 50)" min="1">
                </div>
                <div class="form-group">
                    <input type="number" id="employeesMax" placeholder="Máximo (Ex: 200)" min="1">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="form-group">
                <label>Palavras-Chaves da Empresa</label>
                <div class="tag-container" id="keywordsContainer">
                    <input type="text" class="tag-input" id="keywordsInput" placeholder="Digite ou cole palavras-chaves e aperte Enter">
                </div>
                <div class="help-text">Cole de uma planilha ou digite separando por vírgula.</div>
            </div>
        </div>

        <div class="card">
            <div class="form-group">
                <label>Cargo de Funcionários</label>
                <div class="tag-container" id="titlesContainer">
                    <input type="text" class="tag-input" id="titlesInput" placeholder="Digite ou cole cargos e aperte Enter">
                </div>
                <div class="help-text">Cole de uma planilha ou digite separando por vírgula.</div>
            </div>
        </div>

        <button type="submit">Gerar URL do Apollo</button>
    </form>

    <div class="result-card" id="resultCard">
        <h3>Link de Busca Gerado!</h3>
        <p>Abaixo está a URL estruturada com todos os filtros que você inseriu:</p>
        <div class="url-box" id="urlDisplay"></div>
        <button type="button" class="btn-open" id="btnOpenLink">Abrir Busca no Apollo</button>
    </div>
</div>

<script>
    // Função universal para criar campos com comportamento de Tags (balõezinhos)
    function setupTagInput(containerId, inputId) {
        const container = document.getElementById(containerId);
        const input = document.getElementById(inputId);
        const tags = [];

        function renderTags() {
            container.querySelectorAll('.tag').forEach(el => el.remove());
            tags.forEach((tagText, index) => {
                const tagEl = document.createElement('div');
                tagEl.className = 'tag';
                tagEl.innerHTML = `<span>${tagText}</span> <span class="remove-tag" data-index="${index}">&times;</span>`;
                container.insertBefore(tagEl, input);
            });

            container.querySelectorAll('.remove-tag').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const idx = parseInt(this.getAttribute('data-index'));
                    tags.splice(idx, 1);
                    renderTags();
                });
            });
        }

        function addTags(text) {
            const newTags = text.split(/[\n,\t]+/).map(t => t.trim()).filter(t => t.length > 0);
            newTags.forEach(t => {
                if (!tags.includes(t)) {
                    tags.push(t);
                }
            });
            renderTags();
        }

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ',') {
                e.preventDefault();
                addTags(this.value);
                this.value = '';
            } else if (e.key === 'Backspace' && this.value === '' && tags.length > 0) {
                tags.pop();
                renderTags();
            }
        });

        input.addEventListener('paste', function(e) {
            e.preventDefault();
            const pasteData = (e.clipboardData || window.clipboardData).getData('text');
            addTags(pasteData);
        });

        container.addEventListener('click', function(e) {
            if (e.target === container) {
                input.focus();
            }
        });

        return { getTags: () => [...tags] };
    }

    const companiesManager = setupTagInput('companiesContainer', 'companyNameInput');
    const keywordsManager = setupTagInput('keywordsContainer', 'keywordsInput');
    const titlesManager = setupTagInput('titlesContainer', 'titlesInput');

    let urlFinalApollo = "";

    document.getElementById('apolloForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const employeesMin = document.getElementById('employeesMin').value;
        const employeesMax = document.getElementById('employeesMax').value;
        const resultCard = document.getElementById('resultCard');
        const urlDisplay = document.getElementById('urlDisplay');

        // Construção da URL de busca da interface WEB do Apollo (Modo visual do Usuário)
        const baseUrl = "https://app.apollo.io/#/people";
        const params = new URLSearchParams();

        // Insere o status padrão de busca na aba de pessoas do Apollo
        params.append('finderViewMode', 'candidate');

        // Tratamento dos Filtros para o formato que a plataforma web lê na URL
        const empresas = companiesManager.getTags();
        if (empresas.length > 0) {
            params.append('organizationDomains', empresas.join('\n'));
        }

        const cargos = titlesManager.getTags();
        if (cargos.length > 0) {
            params.append('personTitles', cargos.join('\n'));
        }

        const palavrasChaves = keywordsManager.getTags();
        if (palavrasChaves.length > 0) {
            params.append('qKeywords', keywordsChaves.join(','));
        }

        // Configuração de tamanho de empresa (Mínimo e Máximo)
        if (employeesMin || employeesMax) {
            const min = employeesMin ? parseInt(employeesMin, 10) : '';
            const max = employeesMax ? parseInt(employeesMax, 10) : '';
            params.append('organizationNumEmployees', `${min},${max}`);
        }

        // Junta tudo no link de visualização estruturado do Apollo
        urlFinalApollo = `${baseUrl}?${params.toString()}`;

        // Exibe na tela para o usuário
        urlDisplay.innerText = urlFinalApollo;
        resultCard.style.display = "block";
    });

    // Ação do botão para abrir o link gerado em uma nova aba
    document.getElementById('btnOpenLink').addEventListener('click', function() {
        if (urlFinalApollo) {
            window.open(urlFinalApollo, '_blank');
        }
    });
</script>

</body>
</html>
